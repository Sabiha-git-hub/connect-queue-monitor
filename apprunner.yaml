version: 1.0
runtime: python3
build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install -r requirements.txt
run:
  runtime-version: 3.8
  command: gunicorn --bind :8080 --workers 2 --timeout 120 run:app
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: PORT
      value: "8080"
